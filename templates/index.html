<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neurosymbolic Mafia</title>
  <style>
    :root{--bg:#080b14;--panel:#121827;--panel2:#1b2438;--gold:#f2c14e;--blue:#1f63ff;--red:#ff3456;--green:#40d486;--muted:#96a0b8;--text:#f7f4e9;--line:rgba(255,255,255,.12)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(180deg,#172547 0,#080b14 45%,#04060c 100%);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
    .topbar{height:78px;display:grid;grid-template-columns:180px 1fr auto;gap:18px;align-items:center;padding:12px 18px;border-bottom:2px solid rgba(242,193,78,.35);background:#080b14d9;box-shadow:0 10px 30px #0008;position:relative;z-index:5}.timer{font-size:34px;font-weight:1000;text-align:center;color:var(--gold);border:1px solid #b38a2e;border-radius:14px;padding:8px;background:#191204}.phase{text-align:center;font-size:24px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase}.roles{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end;max-width:620px}.role{font-size:12px;padding:6px 9px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);color:#d9dff0}
    .layout{height:calc(100vh - 78px);display:grid;grid-template-columns:1fr 330px}.center{min-width:0;display:grid;grid-template-rows:auto 1fr 260px;gap:14px;padding:16px}.banner{border-radius:10px;background:linear-gradient(90deg,#1047d9,#5aa2ff,#1047d9);box-shadow:0 10px 24px #0007;border:1px solid #9fc4ff;color:white;text-align:center;font-size:22px;font-weight:1000;letter-spacing:.04em;padding:16px;text-shadow:0 2px 4px #000}.action-panel{position:relative;display:grid;place-items:center;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;overflow:hidden}.action-card{width:min(520px,90%);background:#151b2d;border:1px solid rgba(242,193,78,.45);border-radius:20px;padding:18px;box-shadow:0 20px 70px #0009;text-align:center}.action-card img{width:100%;height:210px;object-fit:cover;border-radius:14px;background:#090d17;border:1px solid var(--line)}.action-card h2{margin:14px 0 6px}.hint{color:var(--muted);font-size:14px}.buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}button{border:0;border-radius:10px;padding:11px 15px;font-weight:1000;cursor:pointer;background:var(--gold);color:#1b1504}button.red{background:var(--red);color:white}button.green{background:var(--green);color:#04140b}button.dark{background:#3b455f;color:white}button.tab{background:#202a40;color:#c8d0e6;border:1px solid var(--line)}button.tab.active{background:var(--gold);color:#171102}
    .chat-wrap{display:grid;grid-template-rows:auto 1fr auto;background:#0f1525;border:1px solid var(--line);border-radius:16px;overflow:hidden}.tabs{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--line);background:#0a0f1d}.chat-log{padding:10px;overflow-y:auto;font-size:14px;line-height:1.45}.line{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)}.composer{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}input{flex:1;background:#080d19;border:1px solid var(--line);border-radius:10px;color:white;padding:12px;outline:none}.mafia-line{color:#ffb0bd}.system-line{color:#9fc4ff}
    .sidebar{border-left:2px solid rgba(242,193,78,.28);background:#0a0f1d;display:grid;grid-template-rows:auto 1fr auto}.side-title{padding:14px 14px 8px;font-weight:1000;color:var(--gold);display:flex;justify-content:space-between}.players{overflow-y:auto;padding:8px 10px 14px;display:flex;flex-direction:column;gap:8px}.player{position:relative;display:grid;grid-template-columns:62px 1fr auto;gap:10px;align-items:center;padding:8px;border-radius:12px;background:linear-gradient(180deg,#172037,#101728);border:1px solid var(--line);cursor:pointer;min-height:78px}.player:hover{border-color:rgba(242,193,78,.6)}.player.dead{filter:grayscale(.8);opacity:.55}.portrait{width:62px;height:62px;border-radius:10px;object-fit:cover;background:#090d17;border:1px solid var(--line)}.pname{font-weight:900}.psub{font-size:12px;color:var(--muted);margin-top:2px}.vote-badge,.intent-badge{min-width:28px;height:28px;display:grid;place-items:center;border-radius:999px;font-weight:1000}.vote-badge{background:#596178;color:white}.vote-badge.leading{background:var(--red);box-shadow:0 0 18px #ff345699}.intent-badge{position:absolute;right:44px;top:6px;background:var(--red);color:#fff;font-size:12px;border:2px solid #ffd1d7}.cross{display:none;position:absolute;left:8px;top:8px;width:62px;height:62px;border-radius:10px;place-items:center;background:#2b000099;color:#ff2e4d;font-size:42px;font-weight:1000}.dead .cross{display:grid}.logs{height:170px;overflow-y:auto;padding:10px 14px;border-top:1px solid var(--line);font-size:12px;color:#d9dff0;background:#080d19}
    @media(max-width:900px){body{overflow:auto}.layout{height:auto;grid-template-columns:1fr}.sidebar{border-left:0;border-top:2px solid rgba(242,193,78,.28)}.topbar{grid-template-columns:1fr}.roles{justify-content:center}.timer{width:120px;margin:auto}}
  </style>
</head>
<body>
<header class="topbar"><div class="timer" id="timer">--</div><div class="phase" id="phase">Connecting</div><div class="roles" id="roles"></div></header>
<main class="layout">
  <section class="center">
    <div class="banner" id="banner">CONNECTING TO GAME SERVER...</div>
    <div class="action-panel"><div class="action-card" id="actionCard"><div class="hint">Select a player from the right sidebar to open a safe confirmation action.</div></div></div>
    <div class="chat-wrap">
      <div class="tabs"><button class="tab active" id="generalTab">General Chat</button><button class="tab" id="mafiaTab" style="display:none">Mafia Chat</button></div>
      <div class="chat-log" id="chatLog"></div>
      <div class="composer"><input id="chatInput" placeholder="Type into selected channel..."/><button id="sendBtn">Send</button></div>
    </div>
  </section>
  <aside class="sidebar"><div class="side-title"><span>Players</span><span id="roleLine">Role: ?</span></div><div class="players" id="players"></div><div class="logs" id="logs"></div></aside>
</main>
<script>
const HUMAN_ID=1;let state=null;let activeChannel='general';let selected=null;const wsProtocol=location.protocol==='https:'?'wss:':'ws:';const ws=new WebSocket(`${wsProtocol}//${location.host}/ws/${HUMAN_ID}`);
const phaseNames={night:'NIGHT',day_nomination:'DAY NOMINATION',day_trial:'TRIAL',finished:'GAME OVER'};
function placeholder(label){const svg=`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 180'><rect width='220' height='180' fill='#101728'/><circle cx='110' cy='70' r='36' fill='#536184'/><path d='M45 170c18-56 112-56 130 0' fill='#536184'/><text x='110' y='25' text-anchor='middle' fill='#f2c14e' font-size='18' font-family='Arial'>${label}</text></svg>`;return'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg)}
function send(payload){if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(payload))}
ws.onopen=()=>addChat('system','Connected to server.');ws.onclose=()=>addChat('system','Disconnected.');ws.onmessage=(event)=>{const msg=JSON.parse(event.data);if(msg.type==='state'){state=msg.state;render()}else if(msg.type==='chat'){addChat(msg.channel||'general',`P${msg.speaker}: ${msg.text}`)}else if(msg.type==='system'){addChat('system',msg.text)}};
function render(){if(!state)return;document.getElementById('timer').textContent=state.timer;document.getElementById('phase').textContent=phaseNames[state.phase]||state.phase;document.getElementById('roleLine').textContent=`You: ${state.human_role}`;document.getElementById('mafiaTab').style.display=state.human_is_mafia?'inline-block':'none';if(!state.human_is_mafia&&activeChannel==='mafia')setChannel('general');renderRoles();renderBanner();renderPlayers();renderLogs()}
function renderRoles(){const box=document.getElementById('roles');box.innerHTML='';Object.entries(state.role_counter).sort().forEach(([role,count])=>{const pill=document.createElement('div');pill.className='role';pill.textContent=`${role}: ${count}`;box.appendChild(pill)})}
function renderBanner(){let text='';if(state.phase==='night')text=`NIGHT ${state.night} HAS STARTED`;else if(state.phase==='day_nomination')text=`DAY ${state.day}: NOMINATE A SUSPECT`;else if(state.phase==='day_trial')text=`TRIAL: VOTING ON ${nameOf(state.trial_target)}`;else text=`GAME OVER: ${state.winner||''}`;document.getElementById('banner').textContent=text}
function nameOf(id){const p=state?.players?.find(x=>x.id===id);return p?`${p.name} (P${p.id})`:`P${id}`}
function renderPlayers(){const box=document.getElementById('players');box.innerHTML='';state.players.forEach(p=>{const row=document.createElement('div');row.className=`player ${p.alive?'':'dead'}`;row.onclick=()=>selectPlayer(p);const intent=Number(state.night_intent_counts[p.id]||0);row.innerHTML=`<img class='portrait' src='/static/${p.avatar}' onerror="this.src=placeholder('P${p.id}')"/><div class='cross'>✕</div><div><div class='pname'>${p.name} <span class='psub'>P${p.id}</span></div><div class='psub'>${p.alive?'Alive':'Dead'}${p.revealed_role?' · '+p.revealed_role:''} · stress ${p.stress}</div>${state.trial_target===p.id?"<div class='psub' style='color:#ffb0bd;font-weight:900'>ON TRIAL</div>":''}</div><div class='vote-badge ${p.is_leading?'leading':''}'>${p.vote_count}</div>${state.phase==='night'&&state.human_is_mafia&&intent>0?`<div class='intent-badge'>☠ ${intent}</div>`:''}`;box.appendChild(row)})}
function renderLogs(){const box=document.getElementById('logs');box.innerHTML='';state.logs.forEach(l=>{const d=document.createElement('div');d.className='line';d.textContent=l;box.appendChild(d)});box.scrollTop=box.scrollHeight}
function selectPlayer(p){selected=p;if(!p.alive||p.id===HUMAN_ID){renderAction(`<div class='hint'>No action available for ${p.name}.</div>`);return}const img=`<img src='/static/${p.avatar}' onerror="this.src=placeholder('P${p.id}')"/>`;let buttons='';let title=`${p.name} (P${p.id})`;let hint='';if(state.phase==='day_nomination'){hint='Confirm nomination vote.';buttons=`<button class='red' onclick='nominate(${p.id})'>Nominate</button>`}else if(state.phase==='day_trial'&&state.trial_target===p.id){hint='The trial target cannot vote. Everyone else votes Guilty or Acquit.';buttons=`<button class='red' onclick="trialVote('guilty')">Guilty</button><button class='green' onclick="trialVote('innocent')">Acquit</button>`}else if(state.phase==='night'){hint=`Night action for ${state.human_role}.`;if(['Mafia','Boss'].includes(state.human_role))buttons=`<button class='red' onclick='nightAction(${p.id})'>Kill</button>`;else if(state.human_role==='Cop')buttons=`<button onclick='nightAction(${p.id})'>Investigate</button>`;else if(state.human_role==='Doc')buttons=`<button class='green' onclick='nightAction(${p.id})'>Heal</button>`;else hint='Citizens have no night action.'}else{hint='No action in this phase.'}renderAction(`${img}<h2>${title}</h2><div class='hint'>${hint}</div><div class='buttons'>${buttons}<button class='dark' onclick='clearAction()'>Cancel</button></div>`)}
function renderAction(html){document.getElementById('actionCard').innerHTML=html}function clearAction(){selected=null;renderAction(`<div class='hint'>Select a player from the right sidebar to open a safe confirmation action.</div>`)}
function nominate(id){send({type:'nominate',target_id:id});clearAction()}function trialVote(verdict){send({type:'trial_vote',verdict});clearAction()}function nightAction(id){send({type:'night_action',target_id:id});clearAction()}
function setChannel(ch){activeChannel=ch;document.getElementById('generalTab').classList.toggle('active',ch==='general');document.getElementById('mafiaTab').classList.toggle('active',ch==='mafia');document.getElementById('chatInput').placeholder=ch==='mafia'?'Private Mafia chat...':'General chat...'}
document.getElementById('generalTab').onclick=()=>setChannel('general');document.getElementById('mafiaTab').onclick=()=>{if(state?.human_is_mafia)setChannel('mafia')};document.getElementById('sendBtn').onclick=sendChat;document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});function sendChat(){const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;send({type:'chat',text,channel:activeChannel});input.value=''}
function addChat(channel,text){if(channel==='mafia'&&!state?.human_is_mafia)return;const box=document.getElementById('chatLog');const d=document.createElement('div');d.className=`line ${channel==='mafia'?'mafia-line':channel==='system'?'system-line':''}`;d.textContent=(channel==='mafia'?'[Mafia] ':channel==='system'?'[System] ':'')+text;box.appendChild(d);box.scrollTop=box.scrollHeight}
</script>
</body>
</html>
